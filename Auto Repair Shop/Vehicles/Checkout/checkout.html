<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CarPal | Vehicle Check-Out</title>

    <!-- Favicon configuration -->
    <link rel="icon" type="image/png" sizes="32x32"
        href="C:\Users\nderu\Documents\Development\Product\CarPal\Technical Writings\Images\Favicon\favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16"
        href="C:\Users\nderu\Documents\Development\Product\CarPal\Technical Writings\Images\Favicon\favicon-16x16.png">
    <link rel="shortcut icon"
        href="C:\Users\nderu\Documents\Development\Product\CarPal\Technical Writings\Images\Favicon\favicon.ico">
    <link rel="apple-touch-icon"
        href="C:\Users\nderu\Documents\Development\Product\CarPal\Technical Writings\Images\Favicon\apple-touch-icon.png">


    <!-- Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&family=Open+Sans:wght@300;400&display=swap"
        rel="stylesheet">

    <!-- External CSS -->
    <link rel="stylesheet" href="checkout.css">
</head>

<body>
    <div class="popup-overlay">
        <div class="checkout-popup">
            <!-- Header Section -->
            <header class="popup-header">
                <img src="C:\Users\nderu\Documents\Development\Product\CarPal\Technical Writings\Brand Identity\CarPal-Logo-PNG.png"
                    alt="CarPal Logo" class="logo">
                <div class="header-right">
                    <div class="notifications">
                        <span class="notification-count">3</span>
                        <a
                            href="C:\Users\nderu\Documents\Development\Product\CarPal\Auto Repair Shop\Notification\notification.html">
                            <i class="notification-icon"></i>
                        </a>
                    </div>
                    <div class="user-profile">
                        <img src="C:\Users\nderu\Documents\Development\Product\CarPal\Technical Writings\Images\Icons\icons8-profile-picture-48.png"
                            alt="Profile" class="profile-img">
                        <span class="username">John's Auto Shop</span>
                        <div class="logout-popup">
                            <a href="C:\Users\nderu\Documents\Development\Product\CarPal\Landing Page\Auto Repair Shop\landing_page.html"
                                class="logout-btn">
                                <i class="fas fa-sign-out-alt"></i>
                                Log Out
                            </a>
                        </div>
                    </div>
                </div>
            </header>

            <!-- Main Content -->
            <main class="checkout-content">
                <h1>Vehicle Check-Out</h1>

                <!-- Progress Tracker -->
                <div class="progress-tracker">
                    <div class="progress-step active">Initiating Check-Out</div>
                    <div class="progress-step">Check-Out Form</div>
                    <div class="progress-step">Post-Repair Assessment</div>
                    <div class="progress-step">Complete Assessment</div>
                </div>

                <!-- Check-Out Form -->
                <form class="checkout-form">
                    <section class="form-section">
                        <h2>Vehicle Information</h2>
                        <div class="form-group">
                            <label for="vehicle-make">Make</label>
                            <input type="text" id="vehicle-make" required>
                        </div>
                        <div class="form-group">
                            <label for="vehicle-model">Model</label>
                            <input type="text" id="vehicle-model" required>
                        </div>
                        <div class="form-group">
                            <label for="license-plate">License Plate</label>
                            <input type="text" id="license-plate" required>
                        </div>
                    </section>

                    <section class="form-section">
                        <h2>Service Summary</h2>
                        <div class="form-group">
                            <label for="service-notes">Service Notes</label>
                            <textarea id="service-notes" rows="4"></textarea>
                        </div>
                        <div class="form-group">
                            <label for="photo-upload">Upload Final Photos</label>
                            <input type="file" id="photo-upload" multiple accept="image/*">
                        </div>
                    </section>

                    <div class="form-actions">
                        <button type="button" class="btn-secondary">Cancel</button>
                        <button type="submit" class="btn-primary">Complete Check-Out</button>
                    </div>
                </form>
            </main>

            <!-- Footer -->
            <footer class="popup-footer">
                <div class="footer-top">
                    <div class="dark-mode">
                        <i class="dark-mode-icon"></i>
                    </div>
                    <div class="social-media">
                        <a href="https://www.instagram.com/@citruske" target="_blank"><i class="instagram-icon"></i></a>
                        <a href="https://x.com/LabsCitrus" target="_blank"><i class="x-icon"></i></a>
                        <a href="https://www.facebook.com/profile.php?id=100063778943426" target="_blank"><i
                                class="facebook-icon"></i></a>
                        <a href="https://www.youtube.com/@citrus-labs" target="_blank"><i class="youtube-icon"></i></a>
                        <a href="https://linkedin.com/company/citrus-labs" target="_blank"><i
                                class="linkedin-icon"></i></a>
                    </div>
                </div>
                <div class="footer-bottom">
                    <div class="legal-links">
                        <a
                            href="C:\Users\nderu\Documents\Development\Product\CarPal\Auto Repair Shop\Footer\terms_of_service.html">Terms
                            of Service</a>
                        <a
                            href="C:\Users\nderu\Documents\Development\Product\CarPal\Auto Repair Shop\Footer\privacy_policy.html">Privacy
                            Policy</a>
                        <a
                            href="C:\Users\nderu\Documents\Development\Product\CarPal\Auto Repair Shop\Footer\data_policy.html">Data
                            Policy</a>
                        <a
                            href="C:\Users\nderu\Documents\Development\Product\CarPal\Auto Repair Shop\Footer\faq.html">FAQ</a>
                    </div>
                    <a href="https://citruslabs.co.ke/" class="corporate-link">Corporate Website</a>
                    <div class="copyright">© 2025 Citrus Labs. All Rights Reserved.</div>
                </div>
            </footer>
        </div>
    </div>
</body>

</html>
