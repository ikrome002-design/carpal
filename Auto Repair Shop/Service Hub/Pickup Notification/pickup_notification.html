        .vehicle-search-dropdown {

        /* Footer */

<body>
    <!-- Sidebar Navigation -->

                <i class="fas fa-cog"></i> Settings
            </a></li>
        </ul>
    </nav>

    <!-- Main Content -->
    <div class="main-container">
        <!-- Top Bar -->
        <div class="top-bar">
            <!-- <div class="action-buttons">
                <a href="#" class="button">
                    <i class="fas fa-plus"></i>
                    Check-In Vehicle
                </a>
                <a href="#" class="button outline">
                    <i class="fas fa-file-invoice"></i>
                    Create Invoice
                </a>
                <a href="#" class="button">
                    <i class="fas fa-sign-out-alt"></i>
                    Check-Out Vehicle
                </a>
            </div> -->
            <img src="C:/Users/nderu/Documents/Development/Product/CarPal/Technical Writings/Images/Icons/icons8-profile-picture-48.png" alt="Profile" style="width: 40px; height: 40px; cursor: pointer;" onclick="toggleProfilePopup()">
        </div>

        <div class="notification" id="notification"></div>

        <form class="notification-form" onsubmit="sendNotification(event)">
            <div class="form-group">
                <label for="vehicleLicense">Vehicle License Plate</label>
                <div class="vehicle-search-container">
                    <input type="text" id="vehicleSearch" class="vehicle-search-input" 
                           placeholder="Search by license plate or select from dropdown..." 
                           oninput="filterVehicles(this.value)">
                    <div id="vehicleSearchDropdown" class="vehicle-search-dropdown">
                        <!-- Dropdown options will be populated by JavaScript -->
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label for="customerName">Customer Name</label>
                <input type="text" id="customerName" readonly>
            </div>

            <div class="form-group">
                <label for="vehicleInfo">Vehicle Information</label>
                <input type="text" id="vehicleInfo" readonly>
            </div>

            <div class="form-group">
                <label for="pickupInstructions">Pickup Instructions</label>
                <textarea id="pickupInstructions" required placeholder="Enter detailed pickup instructions..."></textarea>
            </div>

            <button type="submit" class="button">Send Notification</button>
        </form>
    </div>

    <script>
        // Sample completed service vehicles data
        const completedVehicles = [
            {
                licensePlate: 'KCV 511X',
                customer: 'John Doe',
                vehicle: 'Toyota Mark X (2015)',
                phone: '+254 712 345 678'
            },
            {
                licensePlate: 'KDG 223M',
                customer: 'Jane Smith',
                vehicle: 'Honda Civic (2018)',
                phone: '+254 723 456 789'
            },
            {
                licensePlate: 'KBZ 445P',
                customer: 'Mike Johnson',
                vehicle: 'Mazda Demio (2017)',
                phone: '+254 734 567 890'
            }
        ];

        function filterVehicles(searchTerm) {
            const dropdown = document.getElementById('vehicleSearchDropdown');
            dropdown.innerHTML = '';
            
            if (searchTerm.length === 0) {
                dropdown.classList.remove('active');
                return;
            }

            const filteredVehicles = completedVehicles.filter(vehicle => 
                vehicle.licensePlate.toLowerCase().includes(searchTerm.toLowerCase()) ||
                vehicle.vehicle.toLowerCase().includes(searchTerm.toLowerCase())
            );

            if (filteredVehicles.length > 0) {
                dropdown.classList.add('active');
                filteredVehicles.forEach(vehicle => {
                    const option = document.createElement('div');
                    option.className = 'vehicle-option';
                    option.textContent = `${vehicle.licensePlate} - ${vehicle.vehicle}`;
                    option.onclick = () => selectVehicle(vehicle);
                    dropdown.appendChild(option);
                });
            } else {
                dropdown.classList.remove('active');
            }
        }

        function selectVehicle(vehicle) {
            document.getElementById('vehicleSearch').value = vehicle.licensePlate;
            document.getElementById('customerName').value = vehicle.customer;
            document.getElementById('vehicleInfo').value = vehicle.vehicle;
            document.getElementById('vehicleSearchDropdown').classList.remove('active');
        }

        function sendNotification(event) {
            event.preventDefault();
            
            const licensePlate = document.getElementById('vehicleSearch').value;
            const vehicle = completedVehicles.find(v => v.licensePlate === licensePlate);
            
            if (!vehicle) {
                alert('Please select a valid vehicle');
                return;
            }

            const instructions = document.getElementById('pickupInstructions').value;
            
            const notification = document.getElementById('notification');
            notification.style.display = 'block';
            notification.textContent = `Pickup notification sent to ${vehicle.customer} via SMS (${vehicle.phone}) and email.`;
            
            // Reset form
            document.getElementById('pickupInstructions').value = '';
            
            // Hide notification after 5 seconds
            setTimeout(() => {
                notification.style.display = 'none';
            }, 5000);
        }

        // Close dropdown when clicking outside
        document.addEventListener('click', function(event) {
            const dropdown = document.getElementById('vehicleSearchDropdown');
            const searchInput = document.getElementById('vehicleSearch');
            
            if (!event.target.closest('.vehicle-search-container')) {
                dropdown.classList.remove('active');
            }
        });
    </script>
