    <main>
        <div class="progress-update-form">
            <h1>Send Progress Update</h1>
            <form id="updateForm">
                <div class="form-group">
                    <label for="licensePlate">License Plate</label>
                    <input type="text" id="licensePlate" required placeholder="Enter license plate number">
                </div>

                <div class="form-group">
                    <label for="updateType">Update Type</label>
                    <select id="updateType" required>
                        <option value="">Select update type</option>
                        <option value="template">Pre-defined Template</option>
                        <option value="custom">Custom Message</option>
                    </select>
                </div>

                <div class="form-group" id="templateSection" style="display: none;">
                    <label for="template">Select Template</label>
                    <select id="template">
                        <option value="service-started">Service Started</option>
                        <option value="diagnostic">Diagnostic Update</option>
                        <option value="parts-arrival">Parts Arrival</option>
                        <option value="completion">Service Completion</option>
                        <option value="final-inspection">Final Inspection</option>
                    </select>
                </div>

                <div class="form-group" id="customSection" style="display: none;">
                    <label for="customMessage">Custom Message</label>
                    <textarea id="customMessage" rows="4" placeholder="Enter your custom message"></textarea>
                </div>

                <div class="form-group">
                    <label for="communicationType">Communication Method</label>
                    <select id="communicationType" required>
                        <option value="sms">SMS</option>
                        <option value="email">Email</option>
                        <option value="both">Both</option>
                    </select>
                </div>

                <div class="template-preview">
                    <h3>Preview</h3>
                    <p id="messagePreview">Message preview will appear here...</p>
                </div>

                <button type="submit" class="send-button">Send Update</button>
            </form>
        </div>
    </main>

    <script>
        // User Profile Popup
        document.querySelector('.user-profile').addEventListener('click', function() {
            document.getElementById('userPopup').classList.toggle('active');
        });

        // Update Type Toggle
        document.getElementById('updateType').addEventListener('change', function() {
            const templateSection = document.getElementById('templateSection');
            const customSection = document.getElementById('customSection');
            
            if (this.value === 'template') {
                templateSection.style.display = 'block';
                customSection.style.display = 'none';
            } else if (this.value === 'custom') {
                templateSection.style.display = 'none';
                customSection.style.display = 'block';
            }
        });

        // Template Preview
        function updatePreview() {
            const licensePlate = document.getElementById('licensePlate').value;
            const updateType = document.getElementById('updateType').value;
            const template = document.getElementById('template');
            const customMessage = document.getElementById('customMessage');
            let previewText = '';

            if (updateType === 'template' && template.value) {
                switch(template.value) {
                    case 'service-started':
                        previewText = `Service for ${licensePlate} started. Estimated completion: ${new Date().toLocaleDateString()}`;
                        break;
                    case 'diagnostic':
                        previewText = `Diagnostic phase for ${licensePlate}. Updates for additional repairs.`;
                        break;
                    case 'parts-arrival':
                        previewText = `Parts for ${licensePlate} arrived. Service resuming shortly.`;
                        break;
                    case 'completion':
                        previewText = `Repair complete for ${licensePlate}. Ready for collection.`;
                        break;
                    case 'final-inspection':
                        previewText = `Final inspection for ${licensePlate}. Ready for pickup soon.`;
                        break;
                }
            } else if (updateType === 'custom') {
                previewText = customMessage.value;
            }

            document.getElementById('messagePreview').textContent = previewText;
        }

        // Add event listeners for preview updates
        ['licensePlate', 'updateType', 'template', 'customMessage'].forEach(id => {
            document.getElementById(id).addEventListener('input', updatePreview);
        });

        // Dark Mode Toggle
        document.getElementById('darkModeToggle').addEventListener('click', function() {
            document.body.classList.toggle('dark-mode');
            this.querySelector('i').classList.toggle('fa-sun');
            this.querySelector('i').classList.toggle('fa-moon');
        });

        // Form Submission
        document.getElementById('updateForm').addEventListener('submit', function(e) {
            e.preventDefault();
            // Add your form submission logic here
            alert('Progress update sent successfully!');
        });
    </script>
</body>
