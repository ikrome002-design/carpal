    <main class="popup">
        <div class="popup-header">
            <h1>Add New Staff Member</h1>

        <form id="addStaffForm">
            <!-- Basic Information Section -->
            <div class="form-section">
                <h2>Basic Information</h2>
                <div class="upload-staff-picture">
                    <img src="C:\Users\nderu\Documents\Development\Product\CarPal\Technical Writings\Images\Icons\icons8-profile-picture-100.png"

                <div class="form-group">

            <!-- Role Assignment Section -->

                <h2>Role Assignment</h2>
                <div class="form-group">
                    <label class="required">Staff Role</label>
                    <select name="role" required>
                        <option value="">Select a role</option>
                        <option value="manager">Manager</option>
                        <option value="mechanic">Mechanic</option>
                        <option value="receptionist">Receptionist</option>
                        <option value="accountant">Accountant</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="required">Access Level</label>
                    <select name="accessLevel" required>
                        <option value="">Select access level</option>
                        <option value="full">Full Access</option>
                        <option value="limited">Limited Access</option>
                        <option value="basic">Basic Access</option>
                    </select>
                </div>
            </div>

            <div class="button-group">

                        href="C:\Users\nderu\Documents\Development\Product\CarPal\Auto Repair Shop\Settings\Administrator Features\admin_user_settings.html">Cancel</a></button>

                        Staff Member</a></button>

    <script>
        // User Profile Dropdown Toggle
        const userProfile = document.getElementById('userProfile');
        const userDropdown = document.getElementById('userDropdown');

        userProfile.addEventListener('click', () => {
            userDropdown.classList.toggle('active');
        });

        // Close dropdown when clicking outside
        document.addEventListener('click', (event) => {
            if (!userProfile.contains(event.target)) {
                userDropdown.classList.remove('active');
            }
        });

        // Form Submission Handler
        const addStaffForm = document.getElementById('addStaffForm');
        addStaffForm.addEventListener('submit', (event) => {
