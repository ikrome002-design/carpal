    <link rel="stylesheet" href="auto_invoice_sharing.css">

<body>
    <!-- Main Container -->
    <div class="popup-container">
        <!-- Header -->
        <header class="popup-header">
            <div class="header-content">
                <img src="C:\Users\nderu\Documents\Development\Product\CarPal\Technical Writings\Brand Identity\CarPal-Logo-PNG.png"
                    alt="CarPal Logo" class="logo">
                <div class="user-profile">
                    <img src="C:\Users\nderu\Documents\Development\Product\CarPal\Technical Writings\Images\Icons\icons8-profile-picture-48.png"
                        alt="Profile" class="profile-pic">
                    <span class="username">John's Auto Shop</span>
                    <!-- User Menu Popup -->
                    <div class="user-menu">
                        <a
                            href="C:\Users\nderu\Documents\Development\Product\CarPal\Landing Page\Auto Repair Shop\landing_page.html"><i
                                class="fas fa-sign-out-alt"></i>Log Out</a>
                    </div>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="popup-content">
            <h1>Auto Invoice Sharing</h1>

            <!-- Company Information Section -->
            <section class="section company-info">
                <h2>Company Information</h2>
                <div class="upload-logo">
                    <img src="C:\Users\nderu\Documents\Development\Product\CarPal\Technical Writings\Images\Random Logo\Random Logo PNG.png"
                        alt="Company Logo" class="preview">
                    <button class="upload-btn">Upload Logo</button>
                </div>
                <div class="form-group">
                    <label for="company-name">Company Name</label>
                    <input type="text" id="company-name" value="John's Auto Shop">
                </div>
                <div class="contact-info">
                    <div class="form-group">
                        <label for="phone">Phone Number</label>
                        <input type="tel" id="phone" value="+254 712 345 678">
                    </div>
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" value="info@johnsautoshop.com">
                    </div>
                </div>
            </section>

            <!-- Invoice Settings Section -->
            <section class="section invoice-settings">
                <h2>Invoice Settings</h2>
                <div class="form-group">
                    <label for="template">Default Invoice Template</label>
                    <select id="template">
                        <option value="standard">Standard Template</option>
                        <option value="premium">Premium Template</option>
                        <option value="custom">Custom Template</option>
                    </select>
                </div>
                <div class="auto-share">
                    <h3>Auto-Share Options</h3>
                    <div class="toggle-group">
                        <label class="toggle">
                            <input type="checkbox" checked>
                            <span class="slider"></span>
                            Email Notifications
                        </label>
                        <label class="toggle">
                            <input type="checkbox">
                            <span class="slider"></span>
                            SMS Notifications
                        </label>
                    </div>
                </div>
            </section>

            <!-- Access Controls Section -->
            <section class="section access-controls">
                <h2>Access Controls</h2>
                <div class="permissions">
                    <h3>User Permissions</h3>
                    <div class="permission-group">

                        <label class="toggle">
                            <input type="checkbox">
                            <span class="slider"></span>
                            Allow staff to share invoices
                        </label>

                        <label class="toggle">
                            <input type="checkbox">
                            <span class="slider"></span>
                            Require approval for sharing
                        </label>


                    </div>
                </div>
                <div class="sharing-rules">
                    <h3>Sharing Rules</h3>
                    <div class="rule-group">

                        <label class="toggle">
                            <input type="checkbox">
                            <span class="slider"></span>
                            Auto-share with insurance companies
                        </label>

                        <label class="toggle">
                            <input type="checkbox">
                            <span class="slider"></span>
                            Share payment status updates
                        </label>

                    </div>
                </div>
            </section>

            <!-- Action Buttons -->
            <div class="action-buttons">
                <button class="btn test">Test Connection</button>
                <button class="btn cancel"><a
                        href="C:\Users\nderu\Documents\Development\Product\CarPal\Auto Repair Shop\Settings\Administrator Features\admin_user_settings.html">Cancel</a></button>
                <button class="btn save"><a
                        href="C:\Users\nderu\Documents\Development\Product\CarPal\Auto Repair Shop\Settings\Administrator Features\admin_user_settings.html">Save
                        Settings</a></button>
            </div>
        </main>

        <!-- Footer -->
        <footer class="popup-footer">
            <div class="footer-content">
                <div class="social-icons">
                    <a href="https://www.instagram.com/@citruske" target="_blank"><i class="fab fa-instagram"></i></a>
                    <a href="https://x.com/LabsCitrus" target="_blank"><i class="fab fa-x-twitter"></i></a>
                    <a href="https://www.facebook.com/profile.php?id=100063778943426" target="_blank"><i
                            class="fab fa-facebook"></i></a>
                    <a href="https://www.youtube.com/@citrus-labs" target="_blank"><i class="fab fa-youtube"></i></a>
                    <a href="https://linkedin.com/company/citrus-labs" target="_blank"><i
                            class="fab fa-linkedin"></i></a>
                </div>
                <div class="legal-links">
                    <a
                        href="C:\Users\nderu\Documents\Development\Product\CarPal\Auto Repair Shop\Footer\terms_of_service.html">Terms
                        of Service</a>
                    <a
                        href="C:\Users\nderu\Documents\Development\Product\CarPal\Auto Repair Shop\Footer\privacy_policy.html">Privacy
                        Policy</a>
                    <a
                        href="C:\Users\nderu\Documents\Development\Product\CarPal\Auto Repair Shop\Footer\data_policy.html">Data
                        Policy</a>
                    <a
                        href="C:\Users\nderu\Documents\Development\Product\CarPal\Auto Repair Shop\Footer\faq.html">FAQ</a>
                    <a href="https://citruslabs.co.ke/" target="_blank">Corporate Website</a>
                </div>
                <div class="copyright">
                    &copy; 2025 Citrus Labs. All Rights Reserved.
                </div>
            </div>
        </footer>
    </div>
</body>
