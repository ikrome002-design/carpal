    <!-- Pop-up Container -->
    <div class="popup-overlay">
        <div class="popup-content">
            <div class="popup-header">
                <h2>Add Insurance Contact Details</h2>
                <button class="close-button"><a
                        href="C:\Users\nderu\Documents\Development\Product\CarPal\Auto Repair Shop\Settings\Administrator Features\admin_user_settings.html">&times;</a></button>
            </div>

            <form class="contact-form">
                <div class="form-section">
                    <h3>Basic Information</h3>

                    <div class="form-group">
                        <label for="company-logo">Company Logo</label>
                        <div class="logo-upload">
                            <input type="file" id="company-logo" accept="image/*">
                            <div class="upload-placeholder">
                                <i class="fas fa-cloud-upload-alt"></i>
                                <span>Drop your logo here or click to upload</span>
                            </div>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="company-name">Company Name*</label>
                        <input type="text" id="company-name" required>
                    </div>

                    <div class="form-group">
                        <label for="phone">Phone Number*</label>
                        <input type="tel" id="phone" required pattern="[0-9]{10}">
                    </div>

                    <div class="form-group">
                        <label for="email">Email Address*</label>
                        <input type="email" id="email" required>
                    </div>
                </div>

                <div class="form-actions">
                    <button type="button" class="btn-secondary"><a
                            href="C:\Users\nderu\Documents\Development\Product\CarPal\Auto Repair Shop\Settings\Administrator Features\admin_user_settings.html">Cancel</a></button>
                    <button type="submit" class="btn-primary"><a
                            href="C:\Users\nderu\Documents\Development\Product\CarPal\Auto Repair Shop\Settings\Administrator Features\admin_user_settings.html">Save
                            Contact</a></button>
                </div>
            </form>
        </div>
