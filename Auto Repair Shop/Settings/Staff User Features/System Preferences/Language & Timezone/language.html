    <!-- Language & Timezone Popup -->
    <div class="settings-popup">
        <div class="popup-header">
            <h2>Language & Timezone</h2>
            <button class="close-btn">&times;</button>
        </div>

        <div class="settings-content">
            <!-- Language Settings -->
            <section class="language-section">
                <h3>Language Settings</h3>
                <div class="setting-group">
                    <label for="platform-language">Platform Language</label>
                    <select id="platform-language" class="settings-select">
                        <option value="en">English</option>
                        <option value="sw">Swahili</option>
                    </select>
                </div>
            </section>

            <!-- Timezone Settings -->
            <section class="timezone-section">
                <h3>Timezone Settings</h3>
                <div class="setting-group">
                    <label for="business-timezone">Business Timezone</label>
                    <select id="business-timezone" class="settings-select">
                        <option value="Africa/Nairobi">East Africa Time (EAT)</option>
                        <option value="UTC">Coordinated Universal Time (UTC)</option>
                    </select>
                </div>

                <div class="setting-group">
                    <label for="date-format">Date Format</label>
                    <select id="date-format" class="settings-select">
                        <option value="DD/MM/YYYY">DD/MM/YYYY</option>
                        <option value="MM/DD/YYYY">MM/DD/YYYY</option>
                        <option value="YYYY-MM-DD">YYYY-MM-DD</option>
                    </select>
                </div>

                <div class="setting-group">
                    <label for="time-format">Time Format</label>
                    <select id="time-format" class="settings-select">
                        <option value="24">24-hour</option>
                        <option value="12">12-hour</option>
                    </select>
                </div>
            </section>
        </div>

        <div class="popup-footer">
            <button class="secondary-btn">Cancel</button>
            <button class="primary-btn">Save Changes</button>
        </div>
    </div>

    <footer class="main-footer">
