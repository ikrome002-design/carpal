                    <a href="C:\Users\nderu\Documents\Development\Product\CarPal\Landing Page\Auto Repair Shop\landing_page.html"

                    </a>
                </div>
            </div>
        </div>
    </nav>

    <!-- 2FA Settings Popup -->
    <div class="popup-overlay">
        <div class="popup-content">
            <h2>Two-Factor Authentication Settings</h2>
            <div class="toggle-section">
                <label class="switch">
                    <input type="checkbox" id="2fa-toggle">
                    <span class="slider round"></span>
                </label>
                <span>Enable 2FA</span>
            </div>

            <div class="auth-options">
                <h3>Choose Authentication Method</h3>
                <div class="option">
                    <input type="radio" id="sms-auth" name="auth-method">
                    <label for="sms-auth">SMS Authentication</label>
                </div>
                <div class="option">
                    <input type="radio" id="email-auth" name="auth-method">
                    <label for="email-auth">Email Authentication</label>
                </div>
            </div>

            <div class="verification-section">
                <input type="text" placeholder="Enter phone number or email" class="verify-input">
                <button class="verify-btn">Send Verification Code</button>
                <div class="otp-input">
                    <input type="text" maxlength="6" placeholder="Enter OTP">
                    <button class="verify-otp-btn">Verify</button>
                </div>
            </div>

            <div class="backup-codes">
                <h3>Backup Codes</h3>
                <div class="codes-container">
                    <p>Generate 8 one-time use backup codes for account recovery</p>
                    <button class="generate-btn">Generate Codes</button>
                </div>
            </div>

            <button class="close-btn">Close</button>
        </div>
    </div>

    <!-- Footer -->
    <footer>
