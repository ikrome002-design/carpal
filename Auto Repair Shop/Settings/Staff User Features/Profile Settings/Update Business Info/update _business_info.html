    <!-- Update Business Info Pop-up -->
    <div class="popup-overlay">
        <div class="popup-content">
            <h2>Update Business Information</h2>
            <form id="businessInfoForm">
                <!-- Basic Information -->
                <section class="form-section">
                    <h3>Basic Information</h3>
                    <div class="form-group">
                        <label for="businessName">Business Name</label>
                        <input type="text" id="businessName" name="businessName" required>
                    </div>
                    <div class="form-group">
                        <label for="regNumber">Business Registration Number</label>
                        <input type="text" id="regNumber" name="regNumber" required>
                    </div>
                    <div class="form-group">
                        <label for="taxPin">Tax PIN</label>
                        <input type="text" id="taxPin" name="taxPin" required>
                    </div>
                    <div class="form-group">
                        <label for="businessLogo">Business Logo</label>
                        <input type="file" id="businessLogo" name="businessLogo" accept="image/*">
                    </div>
                    <div class="form-group">
                        <label for="description">Business Description</label>
                        <textarea id="description" name="description" rows="4"></textarea>
                    </div>
                </section>

                <!-- Contact Details -->
                <section class="form-section">
                    <h3>Contact Details</h3>
                    <div class="form-group">
                        <label for="primaryPhone">Primary Phone Number</label>
                        <input type="tel" id="primaryPhone" name="primaryPhone" required>
                    </div>
                    <div class="form-group">
                        <label for="alternativePhone">Alternative Phone Number</label>
                        <input type="tel" id="alternativePhone" name="alternativePhone">
                    </div>
                    <div class="form-group">
                        <label for="businessEmail">Business Email</label>
                        <input type="email" id="businessEmail" name="businessEmail" required>
                    </div>
                    <div class="form-group">
                        <label for="website">Website URL</label>
                        <input type="url" id="website" name="website">
                    </div>
                </section>

                <!-- Business Hours -->
                <section class="form-section">
                    <h3>Business Hours</h3>
                    <div class="form-group">
                        <label for="weekdayHours">Weekday Hours</label>
                        <input type="text" id="weekdayHours" name="weekdayHours" placeholder="e.g., 9:00 AM - 5:00 PM">
                    </div>
                    <div class="form-group">
                        <label for="weekendHours">Weekend Hours</label>
                        <input type="text" id="weekendHours" name="weekendHours" placeholder="e.g., 10:00 AM - 3:00 PM">
                    </div>
                    <div class="form-group">
                        <label for="holidaySchedule">Holiday Schedule</label>
                        <textarea id="holidaySchedule" name="holidaySchedule" rows="3"></textarea>
                    </div>
                    <div class="form-group">
                        <label for="specialHours">Special Hours</label>
                        <textarea id="specialHours" name="specialHours" rows="3"></textarea>
                    </div>
                </section>

                <!-- Location Details -->
                <section class="form-section">
                    <h3>Location Details</h3>
                    <div class="form-group">
                        <label for="address">Physical Address</label>
                        <input type="text" id="address" name="address" required>
                    </div>
                    <div class="form-group">
                        <label for="city">City/Town</label>
                        <input type="text" id="city" name="city" required>
                    </div>
                    <div class="form-group">
                        <label for="county">County</label>
                        <input type="text" id="county" name="county" required>
                    </div>
                    <div class="form-group">
                        <label for="gpsCoordinates">GPS Coordinates</label>
                        <input type="text" id="gpsCoordinates" name="gpsCoordinates">
                    </div>
                    <div class="form-group">
                        <div id="mapLocation" class="map-container"></div>
                    </div>
                </section>

                <!-- Social Media -->
                <section class="form-section">
                    <h3>Social Media</h3>
                    <div class="form-group">
                        <label for="facebook">Facebook URL</label>
                        <input type="url" id="facebook" name="facebook">
                    </div>
                    <div class="form-group">
                        <label for="instagram">Instagram Handle</label>
                        <input type="text" id="instagram" name="instagram">
                    </div>
                    <div class="form-group">
                        <label for="twitter">Twitter Handle</label>
                        <input type="text" id="twitter" name="twitter">
                    </div>
                    <div class="form-group">
                        <label for="linkedin">LinkedIn URL</label>
                        <input type="url" id="linkedin" name="linkedin">
                    </div>
                </section>

                <!-- Form Controls -->
                <div class="form-controls">
                    <button type="submit" class="btn-save">Save Changes</button>
                    <button type="button" class="btn-cancel">Cancel</button>
                    <button type="reset" class="btn-reset">Reset Form</button>
                </div>
            </form>
        </div>
