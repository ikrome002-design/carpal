        rel="stylesheet">

    <!-- Font Awesome for icons -->

    <link rel="stylesheet" href="feedback_report.css">
</head>

<body>
    <!-- Header -->
    <header class="header">
        <div class="logo">
            <img src="C:\Users\nderu\Documents\Development\Product\CarPal\Technical Writings\Brand Identity\CarPal-Logo-PNG.png"
                alt="CarPal Logo">
        </div>
        <div class="header-right">
            <div class="notifications">
                <i class="fas fa-bell"></i>
                <span class="notification-badge">3</span>
            </div>
            <div class="user-profile">
                <img src="C:\Users\nderu\Documents\Development\Product\CarPal\Technical Writings\Images\Icons\icons8-profile-picture-48.png
                " alt="Profile Picture">
                <span class="username">John's Auto Shop</span>
                <!-- User Dropdown -->
                <div class="user-dropdown">
                    <a href="C:\Users\nderu\Documents\Development\Product\CarPal\Landing Page\Auto Repair Shop\landing_page.html"
                        class="logout-btn">
                        <i class="fas fa-sign-out-alt"></i> Log Out
                    </a>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="feedback-container">
        <h1>Submit Feedback or Report Issue</h1>

        <!-- Report Type Selection -->
        <div class="report-type-selector">
            <h2>Select Report Type</h2>
            <div class="report-options">
                <button class="report-btn active" data-type="technical">
                    <i class="fas fa-bug"></i>
                    Technical Issue
                </button>
                <button class="report-btn" data-type="feature">
                    <i class="fas fa-lightbulb"></i>
                    Feature Request
                </button>
                <button class="report-btn" data-type="general">
                    <i class="fas fa-comment"></i>
                    General Feedback
                </button>
            </div>
        </div>

        <!-- Technical Issue Form -->
        <form id="technicalIssueForm" class="feedback-form active">
            <div class="form-group">
                <label for="issueDescription">Issue Description</label>
                <textarea id="issueDescription" rows="4" required></textarea>
            </div>

            <div class="form-group">
                <label for="impactLevel">Impact Level</label>
                <select id="impactLevel" required>
                    <option value="">Select Impact Level</option>
                    <option value="critical">Critical - System Unusable</option>
                    <option value="high">High - Major Feature Affected</option>
                    <option value="medium">Medium - Minor Feature Affected</option>
                    <option value="low">Low - Cosmetic Issue</option>
                </select>
            </div>

            <div class="form-group">
                <label for="screenshot">Screenshot Upload</label>
                <input type="file" id="screenshot" accept="image/*">
            </div>

            <div class="form-group">
                <label for="stepsToReproduce">Steps to Reproduce</label>
                <textarea id="stepsToReproduce" rows="4"></textarea>
            </div>
        </form>

        <!-- Submit Button -->
        <button type="submit" class="submit-btn">
            Submit Report
            <i class="fas fa-paper-plane"></i>
        </button>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="footer-top">
            <div class="theme-toggle">
                <i class="fas fa-moon"></i>
            </div>
            <div class="social-media">
                <a href="https://www.instagram.com/@citruske" target="_blank"><i class="fab fa-instagram"></i></a>
                <a href="https://x.com/LabsCitrus" target="_blank"><i class="fab fa-x-twitter"></i></a>
                <a href="https://www.facebook.com/profile.php?id=100063778943426" target="_blank"><i
                        class="fab fa-facebook"></i></a>
                <a href="https://www.youtube.com/@citrus-labs" target="_blank"><i class="fab fa-youtube"></i></a>
                <a href="https://linkedin.com/company/citrus-labs" target="_blank"><i class="fab fa-linkedin"></i></a>
            </div>
        </div>
        <div class="footer-middle">
            <div class="legal-links">
                <a
                    href="C:\Users\nderu\Documents\Development\Product\CarPal\Auto Repair Shop\Footer\terms_of_service.html">Terms
                    of Service</a>
                <a
                    href="C:\Users\nderu\Documents\Development\Product\CarPal\Auto Repair Shop\Footer\privacy_policy.html">Privacy
                    Policy</a>
                <a href="C:\Users\nderu\Documents\Development\Product\CarPal\Auto Repair Shop\Footer\data_policy.html">Data
                    Policy</a>
            </div>
            <div class="support-links">
                <a href="C:\Users\nderu\Documents\Development\Product\CarPal\Auto Repair Shop\Footer\faq.html">FAQ</a>
                <a href="https://citruslabs.co.ke/" target="_blank">Corporate Website</a>
            </div>
        </div>
        <div class="footer-bottom">
            <p>&copy; 2025 Citrus Labs. All Rights Reserved.</p>
        </div>
    </footer>

    <!-- User Profile Popup -->
    <div class="profile-popup" id="profilePopup">
        <div class="popup-content">
            <div class="popup-header">
                <img src="C:\Users\nderu\Documents\Development\Product\CarPal\Technical Writings\Images\Icons\icons8-profile-picture-48.png"
                    alt="Profile Picture">
                <h3>John's Auto Shop</h3>
            </div>
            <div class="popup-body">
                <a href="C:\Users\nderu\Documents\Development\Product\CarPal\Auto Repair Shop\Landing Page\landing_page.html"
                    class="logout-btn">
                    <i class="fas fa-sign-out-alt"></i>
                    Log Out
                </a>
            </div>
        </div>
    </div>
</body>

</html>
