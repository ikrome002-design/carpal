<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CarPal | Administrator Authentication</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="32x32" href="C:\Users\nderu\Documents\Development\Product\CarPal\Technical Writings\Images\Favicon\favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="C:\Users\nderu\Documents\Development\Product\CarPal\Technical Writings\Images\Favicon\favicon-16x16.png">
    <link rel="shortcut icon" href="C:\Users\nderu\Documents\Development\Product\CarPal\Technical Writings\Images\Favicon\favicon.ico">
    <link rel="apple-touch-icon" href="C:\Users\nderu\Documents\Development\Product\CarPal\Technical Writings\Images\Favicon\apple-touch-icon.png">

    
    <!-- Google Fonts: Poppins and Open Sans -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&family=Open+Sans:wght@300;400&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="admin_log_in.css">
</head>
<body>
    <div class="auth-modal">
        <img src="C:\Users\nderu\Documents\Development\Product\CarPal\Technical Writings\Brand Identity\CarPal-Logo-PNG.png" alt="CarPal Logo" class="logo">
        
        <!-- Email Step -->
        <div class="step active" id="emailStep">
            <h1>Administrator Access</h1>
            <div class="input-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" placeholder="Enter your email">
            </div>
            <button onclick="sendOTP()">Send OTP</button>
        </div>

        <!-- OTP Step -->
        <div class="step" id="otpStep">
            <h1>Enter OTP</h1>
            <div class="input-group">
                <label for="otp">OTP Code</label>
                <input type="text" id="otp" placeholder="Enter OTP code" maxlength="6">
            </div>
            <button onclick="redirectToSettings()">Verify OTP</button>
            <p class="message">OTP sent to your email address</p>
        </div>
    </div>

    <script>
        // Sample admin email for demo
        const ADMIN_EMAIL = "admin@carpal.com";
        
        function sendOTP() {
            const email = document.getElementById('email').value;
            
            // Validate email
            if (!email) {
                alert('Please enter your email address');
                return;
            }

            // Demo validation
            if (email !== ADMIN_EMAIL) {
                alert('Invalid administrator email');
                return;
            }

            // Show OTP step
            document.getElementById('emailStep').classList.remove('active');
            document.getElementById('otpStep').classList.add('active');

            // Simulate OTP being sent
            console.log('OTP sent to: ' + email);
        }

        function verifyOTP() {
            const otp = document.getElementById('otp').value;
            
            // Validate OTP
            if (!otp || otp.length !== 6) {
                alert('Please enter a valid 6-digit OTP');
                return;
            }

            // Demo validation - any 6-digit code works
            if (otp.length === 6 && /^\d+$/.test(otp)) {
                // Simulate successful authentication
                window.location.href = '/admin-settings.html';
            } else {
                alert('Invalid OTP code');
            }
        }


    function redirectToSettings() {
        window.location.href = "file:///C:/Users/nderu/Documents/Development/Product/CarPal/Auto%20Repair%20Shop/Settings/Administrator%20Features/admin_user_settings.html";
    }

    </script>
</body>
</html>
