<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Reset your CarPal account password">
    
    <title>CarPal | Reset Password</title>
    
    <!-- Favicon declarations -->
    <link rel="icon" type="image/png" sizes="32x32" href="C:\Users\nderu\Documents\Development\Product\CarPal\Technical Writings\Images\Favicon\favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="C:\Users\nderu\Documents\Development\Product\CarPal\Technical Writings\Images\Favicon\favicon-16x16.png">
    <link rel="icon" type="image/x-icon" href="C:\Users\nderu\Documents\Development\Product\CarPal\Technical Writings\Images\Favicon\favicon.ico">
    <link rel="apple-touch-icon" href="C:\Users\nderu\Documents\Development\Product\CarPal\Technical Writings\Images\Favicon\apple-touch-icon.png">
    
    <!-- Google Fonts: Poppins and Open Sans -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400&family=Poppins:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        /* Reset default styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Brand colors */
        :root {
            --yellow: #FFD700;
            --black: #000000;
            --charcoal: #2D2D2D;
            --white: #FFFFFF;
        }

        body {
            font-family: 'Open Sans', sans-serif;
            background-color: var(--charcoal);
            color: var(--white);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header styles */
        header {
            padding: 2rem;
            text-align: center;
        }

        .logo {
            max-width: 200px;
            height: auto;
        }

        /* Main content styles */
        main {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }

        .reset-container {
            background-color: var(--black);
            padding: 2rem;
            border-radius: 8px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        h1 {
            font-family: 'Poppins', sans-serif;
            font-weight: 700;
            color: var(--yellow);
            margin-bottom: 1.5rem;
            text-align: center;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-family: 'Poppins', sans-serif;
        }

        input {
            width: 100%;
            padding: 0.75rem;
            border: 2px solid var(--charcoal);
            border-radius: 4px;
            background-color: var(--white);
            font-family: 'Open Sans', sans-serif;
            transition: border-color 0.3s;
        }

        input:focus {
            outline: none;
            border-color: var(--yellow);
        }

        .error-message {
            color: #ff4444;
            font-size: 0.875rem;
            margin-top: 0.5rem;
            display: none;
        }

        button {
            width: 100%;
            padding: 0.75rem;
            background-color: var(--yellow);
            border: none;
            border-radius: 4px;
            color: var(--black);
            font-family: 'Poppins', sans-serif;
            font-weight: 700;
            cursor: pointer;
            transition: opacity 0.3s;
        }

        button:hover {
            opacity: 0.9;
        }

        /* Footer styles */
        footer {
            text-align: center;
            padding: 1rem;
            font-size: 0.875rem;
            background-color: var(--black);
        }

        /* Responsive design */
        @media (max-width: 480px) {
            .reset-container {
                padding: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <header>
        <img src="C:\Users\nderu\Documents\Development\Product\CarPal\Technical Writings\Brand Identity\CarPal-Logo-PNG.png" alt="CarPal Logo" class="logo">
    </header>

    <main>
        <div class="reset-container">
            <h1>Reset Password</h1>
            <form id="resetPasswordForm" novalidate>
                <div class="form-group">
                    <label for="newPassword">New Password</label>
                    <input type="password" id="newPassword" name="newPassword" required>
                    <div class="error-message" id="newPasswordError"></div>
                </div>

                <div class="form-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <input type="password" id="confirmPassword" name="confirmPassword" required>
                    <div class="error-message" id="confirmPasswordError"></div>
                </div>

                <button type="submit">Reset Password</button>
            </form>
        </div>
    </main>

    <footer>
        <p>&copy; 2025 Citrus Labs. All Rights Reserved.</p>
    </footer>

    <script>
        // Form validation and submission handling
        document.getElementById('resetPasswordForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            // Reset error messages
            document.querySelectorAll('.error-message').forEach(el => {
                el.style.display = 'none';
            });

            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            let hasError = false;

            // Validate password length and complexity
            if (newPassword.length < 8) {
                document.getElementById('newPasswordError').textContent = 'Password must be at least 8 characters long';
                document.getElementById('newPasswordError').style.display = 'block';
                hasError = true;
            }

            // Validate password match
            if (newPassword !== confirmPassword) {
                document.getElementById('confirmPasswordError').textContent = 'Passwords do not match';
                document.getElementById('confirmPasswordError').style.display = 'block';
                hasError = true;
            }

            if (!hasError) {
                // Here you would typically make an API call to update the password
                // For demonstration, we'll simulate a successful password reset
                alert('Password reset successful! You will be redirected to the login page.');
                // Redirect to login page
                // window.location.href = '/login';
            }
        });
    </script>
</body>
</html>
