<body>
    <div class="invoice-modal">
        <div class="modal-header">
            <h2>Create Invoice</h2>
            <button class="close-button">&times;</button>
        </div>

        <form id="invoiceForm">
            <!-- Vehicle Selection Section -->
            <div class="form-section">
                <h3 class="section-title">Vehicle Information</h3>
                <div class="form-group">
                    <label for="vehicleSelect">Select Vehicle</label>
                    <select class="form-control" id="vehicleSelect">
                        <option value="">-- Select Vehicle --</option>
                        <option value="new">+ Add New Vehicle</option>
                    </select>
                </div>
            </div>

            <!-- Service Details Section -->
            <div class="form-section">
                <h3 class="section-title">Service Details</h3>
                <table class="service-table">
                    <thead>
                        <tr>
                            <th>Service Item</th>
                            <th>Parts</th>
                            <th>Quantity</th>
                            <th>Price</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="serviceItems">
                        <!-- Service items will be added here dynamically -->
                    </tbody>
                </table>
                <button type="button" class="btn btn-secondary">+ Add Service Item</button>
            </div>

            <!-- Payment Details Section -->
            <div class="form-section">
                <h3 class="section-title">Payment Details</h3>
                <div class="form-group">
                    <label for="paymentType">Payment Type</label>
                    <select class="form-control" id="paymentType">
                        <option value="individual">Individual Payment</option>
                        <option value="business">Business Payment</option>
                        <option value="insurance">Insurance Coverage</option>
                    </select>
                </div>
            </div>

            <div class="button-group">
                <button type="button" class="btn btn-secondary"><a
                        href="C:\Users\nderu\Documents\Development\Product\CarPal\Auto Repair Shop\Invoices\invoices.html">Cancel</a></button>
                <button type="submit" class="btn btn-primary"><a
                        href="C:\Users\nderu\Documents\Development\Product\CarPal\Auto Repair Shop\Invoices\invoices.html">Generate
                        Invoice</a></button>
            </div>
        </form>

        <!-- Footer -->
        <footer class="modal-footer">
            <div class="footer-content">
                <button class="dark-mode-toggle">
                    <i class="fas fa-moon"></i>
                </button>

                <div class="social-icons">
                    <a href="https://www.instagram.com/@citruske" target="_blank"><i class="fab fa-instagram"></i></a>

                    <a href="https://linkedin.com/company/citrus-labs" target="_blank"><i

                </div>
