    <!-- JavaScript -->
    <script>
        // Sample Data
        const sampleData = {
            metrics: {
                checkIns: { value: 24, trend: '+12%', isPositive: true },
                completedServices: { value: 18, trend: '+8%', isPositive: true },
                pendingAssessments: { value: 6, trend: '+2', isPositive: false },
                averageServiceTime: { value: '2.5h', trend: '-30min', isPositive: true }
            },
            vehicles: [
                {
                    model: 'Toyota Mark X',
                    license: 'KCV 511X',
                    status: 'pending',
                    action: 'Start Assessment'
                },
                {
                    model: 'Mercedes-Benz E-Class',
                    license: 'KBZ 991Q',
                    status: 'in-progress',
                    action: 'View Details'
                }
            ],
            invoices: [
                {
                    id: 'INV-2024-001',
                    amount: 'KES. 8,641,951.00',
                    status: 'unpaid',
                    action: 'Send Reminder'
                },
                {
                    id: 'INV-2024-004',
                    amount: 'KES. 2,225,000.50',
                    status: 'partial',
                    action: 'View Invoice'
                }
            ]
        };

        // DOM Elements
        const metricsGrid = document.getElementById('metricsGrid');
        const vehicleList = document.getElementById('vehicleList');
        const invoiceList = document.getElementById('invoiceList');
        const darkModeToggle = document.getElementById('darkModeToggle');
        const searchInput = document.getElementById('searchInput');

        // Populate Metrics
        function populateMetrics() {
            const metrics = sampleData.metrics;
            for (const [key, data] of Object.entries(metrics)) {
                const card = document.createElement('div');
                card.className = 'metric-card';
                card.innerHTML = `
                    <h3>${key.replace(/([A-Z])/g, ' $1').trim()}</h3>
                    <p class="metric-value">${data.value}</p>
                    <span class="trend ${data.isPositive ? 'positive' : 'negative'}">
                        ${data.trend} 
                        <i class="fas fa-arrow-${data.isPositive ? 'up' : 'down'}"></i>
                    </span>
                `;
                metricsGrid.appendChild(card);
            }
        }

        // Populate Vehicles
        function populateVehicles() {
            vehicleList.innerHTML = sampleData.vehicles.map(vehicle => `
                <div class="vehicle-card">
                    <div class="vehicle-info">
                        <h3>${vehicle.model}</h3>
                        <p>License: ${vehicle.license}</p>
                        <span class="status ${vehicle.status}">${vehicle.status}</span>
                    </div>
                    <button class="action-button">${vehicle.action}</button>
                </div>
            `).join('');
        }

        // Populate Invoices
        function populateInvoices() {
            invoiceList.innerHTML = sampleData.invoices.map(invoice => `
                <div class="invoice-card">
                    <div class="invoice-info">
                        <h3>${invoice.id}</h3>
                        <p>${invoice.amount}</p>
                        <span class="status ${invoice.status}">${invoice.status}</span>
                    </div>
                    <button class="action-button">${invoice.action}</button>
                </div>
            `).join('');
        }

        // Dark Mode Toggle
        darkModeToggle.addEventListener('click', () => {
            document.body.classList.toggle('dark-mode');
            const icon = darkModeToggle.querySelector('i');
            icon.classList.toggle('fa-moon');
            icon.classList.toggle('fa-sun');
        });

        // Search Functionality
        searchInput.addEventListener('input', (e) => {
            const searchTerm = e.target.value.toLowerCase();
            // Implement search logic here
        });

        // Initialize Dashboard
        document.addEventListener('DOMContentLoaded', () => {
            populateMetrics();
            populateVehicles();
            populateInvoices();
        });
    </script>
