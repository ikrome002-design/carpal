        <section class="create-account-section">
            <h1>Create Your CarPal Account</h1>
            <form id="accountCreationForm" class="account-form">
                <!-- Personal Information -->
                <div class="form-section">
                    <h2>Personal Information</h2>
                    <div class="form-group">
                        <label for="firstName">First Name</label>
                        <input type="text" id="firstName" name="firstName" required>
                    </div>
                    <div class="form-group">
                        <label for="lastName">Last Name</label>
                        <input type="text" id="lastName" name="lastName" required>
                    </div>
                    <div class="form-group">
                        <label for="staffId">Staff ID</label>
                        <input type="text" id="staffId" name="staffId" required>
                    </div>
                    <div class="form-group">
                        <label for="workEmail">Work Email</label>
                        <input type="email" id="workEmail" name="workEmail" required>
                    </div>
                </div>

                <!-- Security Information -->
                <div class="form-section">
                    <h2>Security Information</h2>
                    <!-- <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" required>

                    </div>
                    <div class="form-group">

                        <input type="password" id="confirmPassword" name="confirmPassword" required>
                    </div> -->
                    <div class="form-group">
                        <label for="securityQuestion">Security Question</label>
                        <select id="securityQuestion" name="securityQuestion" required>
                            <option value="">Select a security question</option>
                            <option value="pet">What was your first pet's name?</option>
                            <option value="school">What school did you first attend?</option>
                            <option value="city">In which city were you born?</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="securityAnswer">Security Answer</label>
                        <input type="text" id="securityAnswer" name="securityAnswer" required>
                    </div>
                    <div class="captcha-container">
                        <!-- CAPTCHA implementation would go here -->
                    </div>
                </div>

                <!-- Legal Agreements -->
                <div class="form-section">
                    <h2>Legal Agreements</h2>
                    <div class="checkbox-group">
                        <input type="checkbox" id="termsAgree" name="termsAgree" required>
                        <label for="termsAgree">

                    </div>
                    <div class="checkbox-group">

                            I agree to the <a
                                href="C:/Users/nderu/Documents/Development/Product/CarPal/CarPal Administrator/Landing Page/Legal/Data Policy/data_policy.html">Data

                        </label>
                    </div>
                </div>

                <button type="submit" class="submit-btn">Create Account</button>
