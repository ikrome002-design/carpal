                    <option value="month">This Month</option>

                <select class="filter-select">
                    <option value="">Filter by Priority</option>

                    <option value="medium">Medium</option>

                </select>
                <button class="btn btn-primary">Compose New</button>

            <table class="data-table">

    <!-- JavaScript for interactivity -->
    <script>
        // Toggle user profile popup
        document.querySelector('.user-profile').addEventListener('click', function() {
            this.querySelector('.logout-popup').classList.toggle('active');
        });

        // Tab switching functionality
        document.querySelectorAll('.nav-tab').forEach(tab => {
            tab.addEventListener('click', function() {
                document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
                this.classList.add('active');
                // Add content switching logic here
            });
        });

        // Close modal functionality
        document.querySelector('.close-modal').addEventListener('click', function() {
            document.querySelector('.notifications-modal').style.display = 'none';
        });

        // Dark mode toggle
        document.querySelector('.dark-mode-toggle').addEventListener('click', function() {
            document.body.classList.toggle('dark-mode');

        });
