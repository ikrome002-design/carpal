    <script>
        // Sample data for demonstration
        const sampleData = {
            businessName: "AutoFix Pro",
            registrationNumber: "BRN123456",
            shopType: "general",
            email: "info@autofixpro.com",
            phone: "+254712345678",
            address: "123 Mechanic Street, Nairobi",
            ownerName: "John Doe",
            ownerEmail: "john@autofixpro.com"
        };

        // Form validation and navigation
        document.addEventListener('DOMContentLoaded', function () {
            // Initialize form with sample data if needed
            if (window.location.search.includes('demo=true')) {
                populateFormWithSampleData();
            }

            // Store form data
            let formData = {};

            function validateSection(sectionId) {
                const section = document.getElementById(sectionId);
                const inputs = section.querySelectorAll('input, select');
                let isValid = true;

                inputs.forEach(input => {
                    if (input.required && !input.value) {
                        isValid = false;
                        showError(input, 'This field is required');
                    } else if (input.type === 'email' && input.value) {
                        if (!validateEmail(input.value)) {
                            isValid = false;
                            showError(input, 'Please enter a valid email address');
                        }
                    } else if (input.type === 'tel' && input.value) {
                        if (!validatePhone(input.value)) {
                            isValid = false;
                            showError(input, 'Please enter a valid phone number');
                        }
                    }
                });

                return isValid;
            }

            function showError(input, message) {
                const errorDiv = input.nextElementSibling;
                if (errorDiv && errorDiv.classList.contains('error-message')) {
                    errorDiv.textContent = message;
                    errorDiv.style.display = 'block';
                } else {
                    const error = document.createElement('div');
                    error.className = 'error-message';
                    error.textContent = message;
                    input.parentNode.insertBefore(error, input.nextSibling);
                }
            }

            function validateEmail(email) {
                return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
            }

            function validatePhone(phone) {
                return /^\+?[\d\s-]{10,}$/.test(phone);
            }

            function navigateSection(current, target) {
                if (target !== 'businessDetails' && !validateSection(current)) {
                    return;
                }

                // Store form data
                const currentSection = document.getElementById(current);
                const inputs = currentSection.querySelectorAll('input, select');
                inputs.forEach(input => {
                    formData[input.id] = input.value;
                });

                // Hide current and show target section
                document.getElementById(current).classList.remove('active');
                document.getElementById(target).classList.add('active');
            }

            function populateFormWithSampleData() {
                Object.keys(sampleData).forEach(key => {
                    const input = document.getElementById(key);
                    if (input) {
                        input.value = sampleData[key];
                    }
                });
            }

            // Add form submission handler
            document.querySelector('form#legal').addEventListener('submit', function (e) {
                e.preventDefault();
                if (!validateSection('legal')) {
                    return;
                }

                // Collect all form data
                const finalFormData = { ...formData };
                const legalInputs = document.querySelectorAll('form#legal input[type="checkbox"]');
                legalInputs.forEach(input => {
                    finalFormData[input.name] = input.checked;
                });

                // Here you would typically send the data to your server
                console.log('Form submitted with data:', finalFormData);

                // Show success message
                alert('Account created successfully! Redirecting to dashboard...');
                // Redirect to dashboard (comment out for demo)
                // window.location.href = '/dashboard';
            });

            // Expose functions to window for button onclick handlers
            window.navigateSection = navigateSection;
            window.validateSection = validateSection;
        });
    </script>
